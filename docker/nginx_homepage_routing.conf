# Nginx Proxy Manager "Advanced" 탭에 이 설정 붙여넣기
# 호스트 설정: ai.on1.kr → Forward to ep_frontend:3000 (기본)
# 아래 규칙이 경로별 우선 프록시를 추가해준다.
#
# 구조:
#   ai.on1.kr/dashboard, /easy, /onboarding, /api, /login, /signup, /admin, /chat
#     → ep_frontend:3000 (mybot 분석)
#   ai.on1.kr/api/sso, /api/auth 등은 mybot 백엔드 (ep_backend:8000)로 이미 프록시됨
#   ai.on1.kr/{code}  (예: /kim)
#     → ep_homepage:3000 (myhome 공개 사이트)
#   ai.on1.kr/{code}/admin
#     → ep_homepage:3000 (myhome 편집기)

# ── mybot Next.js 정적 자산 (우선순위 최상) ──
location /_next/ {
    proxy_pass http://ep_frontend:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# ── mybot 예약 경로 ──
location ~ ^/(dashboard|easy|onboarding|login|signup|admin|chat)(/.*)?$ {
    proxy_pass http://ep_frontend:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# ── mybot API ──
location /api/ {
    proxy_pass http://ep_backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
}

# ── homepage 자체 API ──
location /home/api/ {
    rewrite ^/home/api/(.*) /api/$1 break;
    proxy_pass http://ep_homepage:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# ── 루트("/") — mybot 랜딩 ──
location = / {
    proxy_pass http://ep_frontend:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# ── 그 외 모든 경로(= 홈페이지 슬러그) → myhome ──
# 예: /kim, /kim/admin, /kim/admin/content
location / {
    proxy_pass http://ep_homepage:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
