services:
  # ──────────────── PostgreSQL ──────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ep_postgres
    environment:
      POSTGRES_DB: electionpulse
      POSTGRES_USER: electionpulse
      POSTGRES_PASSWORD: ep_dev_password_2026
    ports:
      - "5440:5432"
    volumes:
      - ep_postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U electionpulse"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ep_network

  # ──────────────── Redis ───────────────────────
  redis:
    image: redis:7-alpine
    container_name: ep_redis
    ports:
      - "6380:6379"
    volumes:
      - ep_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ep_network

  # ──────────────── Backend API ─────────────────
  backend:
    image: ghcr.io/cho-y-j/mybot-backend:latest
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: ep_backend
    restart: always
    env_file: .env.server
    environment:
      - DATABASE_URL=postgresql+asyncpg://electionpulse:ep_dev_password_2026@postgres:5432/electionpulse
      - SYNC_DATABASE_URL=postgresql://electionpulse:ep_dev_password_2026@postgres:5432/electionpulse
      - REDIS_URL=redis://redis:6379
      - CELERY_BROKER_URL=redis://redis:6379/0
    volumes:
      - /home/cho/.claude:/home/appuser/.claude:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ep_network

  # ──────────────── Celery Worker (수집/분석/브리핑) ──
  celery-worker:
    image: ghcr.io/cho-y-j/mybot-backend:latest
    container_name: ep_celery_worker
    restart: always
    env_file: .env.server
    environment:
      - DATABASE_URL=postgresql+asyncpg://electionpulse:ep_dev_password_2026@postgres:5432/electionpulse
      - SYNC_DATABASE_URL=postgresql://electionpulse:ep_dev_password_2026@postgres:5432/electionpulse
      - REDIS_URL=redis://redis:6379
      - CELERY_BROKER_URL=redis://redis:6379/0
    volumes:
      - /home/cho/.claude:/home/appuser/.claude:ro
    command: celery -A app.collectors.tasks:celery_app worker --loglevel=info --concurrency=4
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ep_network

  # ──────────────── Celery Beat (스케줄러) ──────────
  celery-beat:
    image: ghcr.io/cho-y-j/mybot-backend:latest
    container_name: ep_celery_beat
    restart: always
    env_file: .env.server
    environment:
      - DATABASE_URL=postgresql+asyncpg://electionpulse:ep_dev_password_2026@postgres:5432/electionpulse
      - SYNC_DATABASE_URL=postgresql://electionpulse:ep_dev_password_2026@postgres:5432/electionpulse
      - REDIS_URL=redis://redis:6379
      - CELERY_BROKER_URL=redis://redis:6379/0
    volumes:
      - /home/cho/.claude:/home/appuser/.claude:ro
    command: celery -A app.collectors.tasks:celery_app beat --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ep_network

  # ──────────────── Frontend (Next.js) ──────────────
  frontend:
    image: ghcr.io/cho-y-j/mybot-frontend:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: ep_frontend
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    ports:
      - "3100:3000"
    depends_on:
      - backend
    networks:
      - ep_network

volumes:
  ep_postgres_data:
  ep_redis_data:

networks:
  ep_network:
    external: true
    name: ep_network
