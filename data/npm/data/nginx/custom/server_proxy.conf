# ai.on1.kr 경로 기반 라우팅
# resolver + 변수 proxy_pass — upstream IP 변경 자동 감지 (Watchtower 재시작 내성)
resolver 127.0.0.11 valid=5s ipv6=off;

location ^~ /_next/ {
    set $upstream http://ep_frontend:3000;
    proxy_pass $upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_http_version 1.1;
}

# homepage 전용 API — 반드시 /api/ 보다 먼저 (prefix 길이로 우선 매칭)
# 2026-04-18: homepage admin UI(/{code}/admin/*)가 /api/site/*, /api/analytics/*, /api/auth/me 호출하는데
# 기존 /api/ 라우팅이 전부 mybot backend로 보내서 404/403 → homepage로 명시적 라우팅
# homepage 전용 공개 API (후보 홈페이지 렌더링용 — 2026-04-18)
location ^~ /api/public/ {
    set $upstream http://ep_homepage:3000;
    proxy_pass $upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
}

location ^~ /api/site/ {
    set $upstream http://ep_homepage:3000;
    proxy_pass $upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
}
location ^~ /api/analytics/ {
    set $upstream http://ep_homepage:3000;
    proxy_pass $upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
}
# 2026-04-20: /api/auth/me, /api/auth/logout 룰 제거.
# 이전(2026-04-18)에 homepage admin UI용으로 위 두 path를 homepage로 강제 라우팅했으나,
# mybot dashboard도 같은 path를 Bearer JWT로 호출 → homepage가 401 → 무한 refresh → 세션 만료 루프.
# 정공법: homepage 자체 me/logout route를 /api/site/auth/{me,logout} 으로 이동 (NPM `^~ /api/site/`가 자동 라우팅).
# 따라서 /api/auth/* 는 모두 mybot backend(default)로 흐름.

location ^~ /api/ {
    set $upstream http://ep_backend:8000;
    proxy_pass $upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
    proxy_http_version 1.1;
}

location ~ ^/(dashboard|easy|onboarding|login|signup|admin|chat|elections|reports|debate|content|candidates|surveys|trends|youtube|schedules|assistant|history|super-admin|billing|settings)(/.*)?$ {
    set $upstream http://ep_frontend:3000;
    proxy_pass $upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
}

location ^~ /home/api/ {
    set $upstream http://ep_homepage:3000;
    rewrite ^/home/api/(.*) /api/$1 break;
    proxy_pass $upstream;
    proxy_set_header Host $host;
}

location = / {
    set $upstream http://ep_frontend:3000;
    proxy_pass $upstream/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
}

location ^~ /_mh_assets/ {
    set $upstream http://ep_homepage:3000;
    rewrite ^/_mh_assets/(.*) /$1 break;
    proxy_pass $upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_http_version 1.1;
}

location ^~ /fonts/ {
    set $upstream http://ep_frontend:3000;
    proxy_pass $upstream;
    proxy_set_header Host $host;
    expires 30d;
    add_header Cache-Control "public, immutable";
}
